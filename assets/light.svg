<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FrogRim profile banner</title>
  <desc id="desc">A light system dashboard banner for FrogRim showing an AI agent verification pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f7fb"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d8e3ee" stroke-width="1" opacity="0.8"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="22" fill="url(#grid)" opacity="0.8"/>
  <rect x="20" y="20" width="1160" height="280" rx="18" fill="#ffffff" opacity="0.68" stroke="#cbd7e4"/>
  <rect x="20" y="20" width="1160" height="280" rx="18" fill="none" stroke="#2f6df6" opacity="0.2">
    <animate attributeName="opacity" values="0.14;0.34;0.14" dur="6s" repeatCount="indefinite"/>
  </rect>

  <g transform="translate(70 62)">
    <text x="0" y="0" fill="#009966" font-family="Consolas, Menlo, monospace" font-size="16" font-weight="700">SYSTEM.IDENTITY</text>
    <text x="0" y="54" fill="#172033" font-family="Consolas, Menlo, monospace" font-size="54" font-weight="800">FrogRim</text>
    <text x="0" y="92" fill="#52657a" font-family="Consolas, Menlo, monospace" font-size="21">Build wide. Verify deep.</text>

    <g transform="translate(0 132)" font-family="Consolas, Menlo, monospace" font-size="15">
      <text x="0" y="0" fill="#2f6df6">&gt; base</text>
      <text x="78" y="0" fill="#26364a">cross-domain systems</text>
      <text x="0" y="32" fill="#2f6df6">&gt; focus</text>
      <text x="88" y="32" fill="#26364a">agent proof · robotics evidence · product AI</text>
      <text x="0" y="64" fill="#2f6df6">&gt; method</text>
      <text x="98" y="64" fill="#26364a">observe -&gt; capture -&gt; verify -&gt; document limits</text>
    </g>
  </g>

  <g transform="translate(604 76)" font-family="Consolas, Menlo, monospace">
    <text x="0" y="-20" fill="#009966" font-size="15" font-weight="700">EVIDENCE PIPELINE</text>

    <g fill="#ffffff" stroke-width="2">
      <rect x="0" y="0" width="110" height="64" rx="10" stroke="#2f6df6"/>
      <rect x="145" y="0" width="110" height="64" rx="10" stroke="#00a6c8"/>
      <rect x="290" y="0" width="110" height="64" rx="10" stroke="#00a86b"/>
      <rect x="435" y="0" width="110" height="64" rx="10" stroke="#ff7a1a"/>
    </g>

    <g fill="#172033" font-size="17" font-weight="700">
      <text x="15" y="39">observe</text>
      <text x="161" y="39">capture</text>
      <text x="321" y="39">verify</text>
      <text x="447" y="39">document</text>
    </g>

    <g fill="none" stroke="#2f6df6" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 10">
      <path d="M118 32H137">
        <animate attributeName="stroke-dashoffset" from="0" to="-26" dur="1.6s" repeatCount="indefinite"/>
      </path>
      <path d="M263 32H282">
        <animate attributeName="stroke-dashoffset" from="0" to="-26" dur="1.6s" repeatCount="indefinite"/>
      </path>
      <path d="M408 32H427">
        <animate attributeName="stroke-dashoffset" from="0" to="-26" dur="1.6s" repeatCount="indefinite"/>
      </path>
    </g>

    <g transform="translate(0 108)" font-size="14">
      <g>
        <rect x="0" y="0" width="126" height="40" rx="8" fill="#f7fbff" stroke="#2f6df6"/>
        <text x="18" y="25" fill="#26364a">31/31 tests</text>
      </g>
      <g>
        <rect x="138" y="0" width="138" height="40" rx="8" fill="#f3fbf7" stroke="#00a86b"/>
        <text x="154" y="25" fill="#26364a">benchmark 23</text>
      </g>
      <g>
        <rect x="288" y="0" width="138" height="40" rx="8" fill="#f8f5ff" stroke="#8b5cf6"/>
        <text x="304" y="25" fill="#26364a">regression 5</text>
      </g>
      <g>
        <rect x="438" y="0" width="148" height="40" rx="8" fill="#fff7ed" stroke="#ff7a1a"/>
        <text x="452" y="25" fill="#26364a">Forge MVP-2</text>
      </g>
    </g>
  </g>

  <circle cx="1128" cy="62" r="5" fill="#00a86b" filter="url(#soft)">
    <animate attributeName="r" values="4;8;4" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;1;0.45" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
